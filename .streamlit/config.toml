[theme]
base = "dark"
primaryColor = "#3b82f6"
backgroundColor = "#0a0f1e"
secondaryBackgroundColor = "#111827"
textColor = "#e2e8f0"
font = "monospace"

[server]
headless = true
port = 8501
maxUploadSize = 50
enableXsrfProtection = true
enableCORS = false

[browser]
gatherUsageStats = false

[runner]
magicEnabled = false